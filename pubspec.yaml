name: neverthrow_dart
description: Result and Option for Dart, with addition of FutureResult and do-notation. Inspired by fp_dart, dartz, and neverthrow for TypeScript.
version: 1.0.1
homepage: https://github.com/ColaFanta/neverthrow_dart
repository: https://github.com/ColaFanta/neverthrow_dart
topics:
  - result
  - option
  - error-handling
  - functional-programming
  - monad

environment:
  sdk: ^3.5.0

dependencies:
  freezed_annotation: ^3.1.0

dev_dependencies:
  lints: ^6.1.0
  build_runner: ^2.13.1
  freezed: ^3.2.3
  json_serializable: ^6.12.0
  test: any
